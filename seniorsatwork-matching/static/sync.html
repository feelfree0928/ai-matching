<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Index sync status</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0f1419; color: #e6edf3; }
    body { max-width: 56rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    p { color: #8b949e; font-size: 0.9rem; }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0; }
    button {
      background: #238636; color: #fff; border: none; padding: 0.5rem 1rem;
      border-radius: 6px; cursor: pointer; font-size: 0.9rem;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    pre {
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 1rem; overflow: auto; font-size: 0.75rem; line-height: 1.4; white-space: pre-wrap;
    }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
    .pending { background: #30363d; }
    .running { background: #1f6feb; }
    .completed { background: #238636; }
    .failed, .timeout { background: #da3633; }
    label { font-size: 0.85rem; color: #8b949e; }
  </style>
</head>
<body>
  <h1>Elasticsearch index sync</h1>
  <p>Starts a background sync and polls until it finishes. Same origin as the API (<code>/api/...</code>).</p>

  <div class="row">
    <button type="button" id="btn-candidates">Start candidates sync</button>
    <button type="button" id="btn-jobs" class="secondary">Start jobs sync</button>
  </div>

  <div id="current">
    <p><label>sync_id</label> <code id="sync-id">—</code></p>
    <p><label>status</label> <span id="status" class="badge pending">idle</span></p>
    <p id="meta"></p>
    <h2 style="font-size:1rem;margin-top:1.5rem;">stdout (tail)</h2>
    <pre id="out">—</pre>
    <h2 style="font-size:1rem;margin-top:1rem;">stderr (tail)</h2>
    <pre id="err">—</pre>
  </div>

  <script>
    const POLL_MS = 2000;
    let pollTimer = null;

    function setBadge(el, status) {
      el.className = 'badge ' + (status || 'pending');
      el.textContent = status || '—';
    }

    function terminalStatus(s) {
      return s === 'completed' || s === 'failed' || s === 'timeout';
    }

    async function pollStatus(syncId) {
      const r = await fetch('/api/index/sync/status/' + encodeURIComponent(syncId));
      if (!r.ok) {
        document.getElementById('meta').textContent = 'GET status failed: ' + r.status;
        return;
      }
      const j = await r.json();
      setBadge(document.getElementById('status'), j.status);
      document.getElementById('sync-id').textContent = j.sync_id;
      let meta = [];
      if (j.started_at) meta.push('started_at: ' + j.started_at);
      if (j.finished_at) meta.push('finished_at: ' + j.finished_at);
      if (j.exit_code !== null && j.exit_code !== undefined) meta.push('exit_code: ' + j.exit_code);
      if (j.ok !== null && j.ok !== undefined) meta.push('ok: ' + j.ok);
      if (j.error) meta.push('error: ' + j.error);
      document.getElementById('meta').textContent = meta.join(' · ');
      document.getElementById('out').textContent = j.stdout_tail != null ? j.stdout_tail : '—';
      document.getElementById('err').textContent = j.stderr_tail != null ? j.stderr_tail : (j.error || '—');

      if (terminalStatus(j.status) && pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
        document.getElementById('btn-candidates').disabled = false;
        document.getElementById('btn-jobs').disabled = false;
      }
    }

    async function startSync(path) {
      document.getElementById('btn-candidates').disabled = true;
      document.getElementById('btn-jobs').disabled = true;
      document.getElementById('out').textContent = '—';
      document.getElementById('err').textContent = '—';
      setBadge(document.getElementById('status'), 'starting');

      const r = await fetch(path, { method: 'POST' });
      const j = await r.json().catch(() => ({}));
      if (r.status !== 202 || !j.sync_id) {
        document.getElementById('meta').textContent = 'POST failed: ' + r.status + ' ' + (j.message || JSON.stringify(j));
        setBadge(document.getElementById('status'), 'failed');
        document.getElementById('btn-candidates').disabled = false;
        document.getElementById('btn-jobs').disabled = false;
        return;
      }
      const syncId = j.sync_id;
      document.getElementById('sync-id').textContent = syncId;
      document.getElementById('meta').textContent = 'Polling ' + (j.status_path || '/api/index/sync/status/...');

      if (pollTimer) clearInterval(pollTimer);
      await pollStatus(syncId);
      pollTimer = setInterval(() => pollStatus(syncId), POLL_MS);
    }

    document.getElementById('btn-candidates').addEventListener('click', () => startSync('/api/index/candidates/sync'));
    document.getElementById('btn-jobs').addEventListener('click', () => startSync('/api/index/jobs/sync'));
  </script>
</body>
</html>
